<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Learning Resources Repository</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <img src="pes-logo.png" alt="School Logo" class="school-logo">
        <h1>PANITIAN ELEMENTARY SCHOOL</h1>
        <h2>Learning Resources Repository</h2>

        <form id="loginForm">
            <label for="username">Enter your LRN and click Login:</label>
            <input type="text" id="username" placeholder="Type here your LRN" required>
            <p id="error-message"></p> <!-- Display error messages dynamically -->
            <button type="submit">Login</button>
        </form>

        <div class="social-links">
            <a href="https://web.facebook.com/110911PES" target="_blank">Facebook Page</a> |
            <a href="https://sites.google.com/deped.gov.ph/panitianelementaryschool-11091/home" target="_blank">School Website</a>
        </div> 
        <div class="contact-info">
            <p>Contact us: <a href="+639-685-241-861">+639-685-241-861</a></p>
        </div>
               
    </div>
    <script src="script.js"></script>
</body>
</html>
